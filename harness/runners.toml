command = ["python3", "harness/bench/profile-calltree.py", "--suite", "big", "--profile-seconds", "8"]
timeout_s = 3600
resources = ["benchmark-host", "bench-results", "profiler", "port:6379", "port:16379"]
claim_level = "telemetry"
capabilities = ["performance-profile-matrix", "faithful-runtime-ownership"]

[[runner]]
id = "regress-core-p100-ping"
kind = "performance_regression"
surface = "performance"
method = "bench-load"
metric = "throughput_ratio"
target = "rust-vs-reference"
workload = "core-p100/PING_MBULK"
max_regression_pct = 12.0
min_points = 2
resources = ["bench-results"]
claim_level = "internal-regression-gate"
capabilities = ["performance-profile-matrix", "faithful-runtime-ownership"]

