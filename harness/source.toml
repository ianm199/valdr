# Upstream source for redis-rs-port.
#
# Valkey is the BSD-3 fork of Redis 7.2.4 (March 2024), maintained by
# the Linux Foundation. Chosen over current Redis (AGPL/SSPL/RSAL) for
# license compatibility with the Rust port.

[source]
name     = "valkey"
repo     = "https://github.com/valkey-io/valkey"
tag      = "9.1.0"
commit   = "c9e8005e9"  # 2026-05-19 — first stable Valkey release that has the
                        # --skip-leaks test_helper flag we depend on; 4 days
                        # ahead of our prior unstable test base (0321a69).
license  = "BSD-3-Clause"
local    = "reference/valkey"
primary_file = "reference/valkey/src/server.c"

[build.reference]
command  = "make -j4 BUILD_TLS=no DISABLE_WERRORS=yes"
cwd      = "reference/valkey"
artifacts = [
  "reference/valkey/src/valkey-server",
  "reference/valkey/src/valkey-cli",
  "reference/valkey/src/valkey-benchmark",
]

[build.target]
command  = "cargo check --workspace"

[tests.reference]
list  = "./runtest --list-tests"
smoke = "./runtest --single unit/protocol --clients 1 --timeout 120"

[tests.target]
unit = "cargo test --workspace"

[oracles]
# Skeletons; not implemented yet.
wire_diff    = "harness/oracle/wire-diff"
tcl_external = "harness/oracle/run-tcl-external"
