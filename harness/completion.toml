schema_version = 1

[project]
name = "valkey-rs-runtime-owner-poller-run"
target = "faithful runtime-owner poller experiment after std plain-TCP owner-loop"
description = "This run is complete when the current runtime-owner baseline is reproven, call-tree profiling support exists, the architect approves or blocks the poller step, the mio plain-TCP readiness poller is attempted, and post-poller oracle/benchmark/profile/regression evidence exists."
non_goals = [
  "Sharding",
  "Benchmark-only command fast paths",
  "Making the runtime-owner scaffold the default server loop",
  "Moving the live DB list fully into RuntimeOwner during the std overnight packet; runtime-owner-4 uses existing global_databases handles as transitional storage",
  "Dropping ACL, MULTI/EXEC, scripting, expiration, pub/sub, blocking, AOF, RDB, or replication semantics for speed",
  "TLS owner-loop migration (locked out-of-scope this milestone by harness/architecture/decisions/runtime-ownership.md; gated on TODO(human) tls_migration_sequencing)",
  "Adding raw epoll/kqueue/libc readiness code, choosing a poller other than mio, or raising unsafe budgets for a poller; runtime-owner-7 approves mio only for the bounded plain-TCP packet",
  "Moving TLS into the poller owner loop during this milestone",
  "Moving the live DB list fully into RuntimeOwner during this milestone",
  "Any public speed-parity claim sourced from a non-default experimental mode; numbers from this run are alpha telemetry only",
  "Authoring a runtime-owner-soak runner before harness/bench/run-soak.sh and the human-decided workload/threshold exist",
]
binding_architecture_artifacts = [
  "harness/architecture/decisions/runtime-ownership.md",
  "harness/architecture/lifecycle-map.toml",
  "harness/architecture/object-vocabulary.tsv",
]
decision_evidence_root = "harness/evidence/runs/20260522T010206Z-15060d7-runner-runtime-owner-baseline-hotspots.json"
poller_decision_evidence_root = "harness/evidence/runs/20260522T140909Z-0022bc7-runner-runtime-owner-6-current-calltree.json"
latest_runtime_owner_evidence = [
  "harness/evidence/runs/20260522T135522Z-d884855-runner-runtime-owner-6-current-oracle.json",
  "harness/evidence/runs/20260522T135524Z-5f159bc-runner-runtime-owner-6-current-profile-matrix.json",
  "harness/evidence/runs/20260522T135537Z-1edcb59-runner-runtime-owner-6-current-hotspots.json",
  "harness/evidence/runs/20260522T140909Z-0022bc7-runner-runtime-owner-6-current-calltree.json",
]

[[criterion]]
id = "workspace-check"
kind = "command_success"
required = false
command = ["cargo", "check", "--workspace"]

[[criterion]]
id = "runtime-owner-poller-packets"
kind = "packets_completed"
required = true
packets = [
  "runtime-owner-6-current-oracle",
  "runtime-owner-6-current-profile-matrix",
  "runtime-owner-6-current-hotspots",
  "runtime-owner-6-profile-artifact-runner",
  "runtime-owner-6-current-calltree",
  "runtime-owner-7-poller-architecture",
  "runtime-owner-8-mio-poller-owner-loop",
  "runtime-owner-8-post-poller-oracle",
  "runtime-owner-8-post-poller-profile-matrix",
  "runtime-owner-8-post-poller-hotspots",
  "runtime-owner-8-post-poller-calltree",
  "runtime-owner-8-regression-ping-p100",
  "runtime-owner-8-regression-get-p100",
  "runtime-owner-8-regression-set-p100",
  "runtime-owner-8-regression-incr-p100",
]

[[criterion]]
id = "poller-current-wire-smoke"
kind = "runner_latest_pass"
required = true
packet = "runtime-owner-6-current-oracle"
runner = "wire-smoke"

[[criterion]]
