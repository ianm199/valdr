# Per-crate unsafe-occurrence ceilings. Enforced by the chassis
# unsafe-budget hook.
#
# Default ceiling for unlisted crates: 0. Raising a ceiling requires
# editing this file in a commit that explains why. These numbers are ceilings,
# not targets: prefer deleting unsafe or moving it behind audited safe wrappers.
#
# Current approved exceptions are concentrated in OS/process-control paths,
# hardware timer reads, and the FUNCTION/FCALL Lua callback lifetime bridge.
# No unsafe is expected in byte-string parsing, command dispatch tables, or
# in-memory data structure ports.

[crates]
"redis-types"     = 0
"redis-protocol"  = 0
# Raised to 2 for the aarch64 monotonic hardware-counter reader in
# monotonic.rs. Both unsafe blocks are inline assembly `mrs` reads of CPU timer
# registers (`cntvct_el0`, `cntfrq_el0`): no pointers, no memory access.
"redis-core"      = 2
# Raised to 7 for:
#   * persist.rs: two fork(2) + _exit child paths for BGSAVE and replication
#     full-sync COW snapshots.
#   * eval.rs: three raw-pointer dereferences used to bridge cached mlua
#     callbacks to the active per-call CommandContext and script state cells.
#   * connection.rs: shutdown child cleanup via kill/waitpid and immediate
#     process _exit.
"redis-commands"  = 7
# Raised to 5 for:
#   * two waitpid(WNOHANG) child reapers for BGSAVE and replication BGSAVE.
#   * one SIGTERM/SIGINT signal-handler install.
#   * two immediate _exit calls in the signal-shutdown watcher.
"redis-server"    = 5
